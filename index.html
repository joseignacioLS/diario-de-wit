<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diario de Wit</title>
    <link rel="stylesheet" href="styles.css">
</head>
<script src="main.js"></script>

<body>
    <header>
        <h1>Diario de Wit</h1>
    </header>
    <main>
        <h2>Partidas</h2>
        <ul id="games-list">
        </ul>
    </main>
    <footer></footer>
</body>
<script>
    const baseUrl = "https://joseignaciols.github.io/diario-de-wit"
    const isProduction = window.location.hostname === "joseignaciols.github.io";
    const games = [
        {
            title: "El Truhan Errante",
            url: "/el-truhan-errante/"
        }
    ]
    const gamesListElement = document.querySelector('#games-list');

    games.forEach(game => {
        const listItem = document.createElement('li');
        const linkItem = document.createElement('a');
        linkItem.href = isProduction ? baseUrl + game.url : game.url;
        linkItem.textContent = game.title;
        listItem.appendChild(linkItem);
        gamesListElement?.appendChild(listItem);
    });
</script>

</html>
