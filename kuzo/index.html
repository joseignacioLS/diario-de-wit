<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Resumen del oneshot sobre Kuzo, un kenku clérigo">
    <title>Kuzo</title>
    <link rel="icon" type="image/x-icon" href="../favicon.ico">
    <link rel="stylesheet" href="./styles.css">
    <script type="module" defer>
        import { renderDiary } from "../js/render.js";
        const diary = "kuzo"
        renderDiary(diary);

        document.querySelector("#sort").addEventListener("click", (e) => {
            if (e.target.dataset.sort === "desc") {
                e.target.dataset.sort = "asc";
                e.target.innerHTML = "Ascendente"
                renderDiary(diary, true)
            }
            else {
                e.target.dataset.sort = "desc";
                e.target.innerHTML = "Descendente"
                renderDiary(diary, false)
            }
        })
    </script>
    <script src="../js/navigation.js" type="module" defer></script>
</head>

<body class="with-aside">
    <header>
        <a href="/">Atrás</a>
        <h1>Kuzo</h1>
    </header>
    <aside>
        <nav>
            <ul id="menu-list"></ul>
        </nav>
    </aside>
    <main>
        <h2>
            Resumen <button id="sort" data-sort="desc">Descendente</button>
        </h2>
        <p>Kuzo es un clérigo Kenku que junto a dos aventureros, trata de encontrar su destino en la senda de Mask.
        </p>
        <h2>Sesiones</h2>
        <section id="sessions"></section>
    </main>
    <footer></footer>
</body>

</html>
